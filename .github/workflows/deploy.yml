name: 旅しおり ビルド & デプロイ

on:
  repository_dispatch:
    types: [update-itinerary]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save itinerary JSON
        run: |
          mkdir -p dist
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.itinerary) }}' > dist/data.json
          else
            if [ -f "data.json" ]; then
              cp data.json dist/data.json
            else
              echo '{"trip_title":"サンプル旅程","generated_at":"","schedule":[],"spots":[],"checklist":[]}' > dist/data.json
            fi
          fi

      - name: Build HTML
        run: |
          DATA=$(cat dist/data.json)
          sed "s|__ITINERARY_DATA__|$(echo "$DATA" | sed 's/[&/\]/\\&/g; s/$/\\n/' | tr -d '\n')|g" \
            src/template.html > dist/index.html
          ls -lh dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
